<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Injection 실습 하네스</title>
    <style>
        :root {
            --primary-color: #00ff41; /* 매트릭스 그린 */
            --accent-color: #ff3e3e;  /* 경고 레드 */
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --highlight: #ffff00;   /* 입력값 강조색 */
        }

        body {
            font-family: 'Cascadia Code', 'Courier New', monospace;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 2rem;
            border-bottom: 1px solid var(--primary-color);
            width: 100%;
            box-sizing: border-box;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            width: 90%;
            max-width: 1200px;
            margin-top: 2rem;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid #333;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 255, 65, 0.1);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #888;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #00cc33;
        }

        /* 하네스 모니터 스타일 */
        .monitor {
            background: #000;
            padding: 1.5rem;
            border-radius: 5px;
            font-size: 1.1rem;
            line-height: 1.6;
            word-break: break-all;
            border: 1px dashed #555;
        }

        .sql-keyword { color: #569cd6; }
        .sql-string { color: #ce9178; }
        .user-input { 
            background-color: rgba(255, 255, 0, 0.2);
            color: var(--highlight);
            text-decoration: underline;
            font-weight: bold;
        }

        #result-display {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .success { background: rgba(0, 255, 65, 0.2); border: 1px solid var(--primary-color); }
        .fail { background: rgba(255, 62, 62, 0.2); border: 1px solid var(--accent-color); color: var(--accent-color); }

        footer {
            margin-top: auto;
            padding: 2rem;
            font-size: 0.8rem;
            color: #555;
        }

        @media (max-width: 850px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>SYSTEM AUTHENTICATION HARNESS</h1>
    <p>SQL Injection 취약점 분석 및 실습 환경</p>
</header>

<div class="main-container">
    <div class="panel">
        <h2>사용자 로그인</h2>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="idInput" placeholder="ID를 입력하세요" oninput="updateHarness()" autocomplete="off">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="text" id="pwInput" placeholder="PW를 입력하세요" oninput="updateHarness()" autocomplete="off">
        </div>
        <button onclick="simulateLogin()">AUTHENTICATE</button>
        
        <div id="result-display"></div>
    </div>

    <div class="panel">
        <h2>백엔드 SQL 쿼리 모니터링</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">* 입력값이 쿼리에 직렬화되는 과정을 실시간으로 확인하세요.</p>
        <div class="monitor" id="queryMonitor">
            <span
